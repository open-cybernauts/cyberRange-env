# Rendered scenario artifact for {{VARIANT_ID}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: helpdesk-public
  namespace: {{NAMESPACE}}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: {{PUBLIC_HOST}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: helpdesk-web
                port:
                  number: 80
