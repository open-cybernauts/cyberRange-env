# Rendered scenario artifact for helpdesk_easy_union
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: helpdesk-public
  namespace: company-it
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: support.northbridge.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: helpdesk-web
                port:
                  number: 80
