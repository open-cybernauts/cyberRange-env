# Rendered scenario artifact for helpdesk_easy_union
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: company-it
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: helpdesk
            - name: POSTGRES_USER
              value: helpdesk_app
            - name: POSTGRES_PASSWORD
              value: northbridge_helpdesk_dev
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/020-seed-flag.sql
              subPath: 020-seed-flag.sql
      volumes:
        - name: init-sql
          configMap:
            name: postgres-init-sql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: company-it
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
